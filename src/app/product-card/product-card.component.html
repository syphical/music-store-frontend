<div class="product-container">
  <img [src]="product.imagePath || '../../assets/UbermenschPINK.webp'" alt="Product image">
  <div class="product-informatie">
    <p class="product-artiest">{{ product.artist.name }}</p>
    <p class="product-naam">{{ product.name }}</p>
    <p class="product-prijs">{{ product.price | currency:"EUR":"symbol":"1.2-2" }}</p>
    <button class="koopbutton">In winkelwagen</button>
  </div>
</div>
