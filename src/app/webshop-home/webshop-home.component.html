<app-aotw/>

<div class="featured-section">
  <h1 class="featured-title">{{ 'HOME.FEATURED_PRODUCTS' | translate }}</h1>
</div>
<div class="product-lijst">
  @if (isLoading) {
    <div class="loading-spinner">
      <p>{{ 'HOME.LOADING' | translate }}</p>
    </div>
  } @else if (error) {
    <div class="error-message">
      <p>{{ error }}</p>
      <button (click)="loadFeaturedProducts()">{{ 'HOME.TRY_AGAIN' | translate }}</button>
    </div>
  } @else {
    <app-webshop-product-list [products]="featuredProducts" [isFeatured]="true"/>
  }
</div>
